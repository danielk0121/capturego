<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaptureGo Settings</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <div id="top-bar" class="top-bar"></div>

    <div class="card">
      <h2 data-i18n="section_permissions"></h2>
      <div id="permList">
        <div class="perm-row">
          <div class="perm-row-left">
            <span data-i18n="perm_screen_recording"></span>
            <span class="perm-row-desc" data-i18n="perm_screen_recording_desc"></span>
          </div>
          <div class="perm-row-right" id="permScreen">
            <span class="perm-badge"></span>
            <a class="perm-open-btn hidden" href="x-apple.systempreferences:com.apple.preference.security?Privacy_ScreenCapture" data-i18n="perm_open_settings"></a>
          </div>
        </div>
        <div class="perm-row">
          <div class="perm-row-left">
            <span data-i18n="perm_accessibility"></span>
            <span class="perm-row-desc" data-i18n="perm_accessibility_desc"></span>
          </div>
          <div class="perm-row-right" id="permAccess">
            <span class="perm-badge"></span>
            <a class="perm-open-btn hidden" href="x-apple.systempreferences:com.apple.preference.security?Privacy_Accessibility" data-i18n="perm_open_settings"></a>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section_save_path"></h2>
      <div class="form-group">
        <label for="saveDir" data-i18n="label_save_dir"></label>
        <input type="text" id="saveDir" data-i18n-placeholder="placeholder_save_dir">
        <p class="hint" data-i18n="hint_save_dir"></p>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section_hotkeys"></h2>
      <div class="form-group">
        <label for="hotkeyCapture" data-i18n="label_hotkey_capture"></label>
        <input type="text" id="hotkeyCapture" data-i18n-placeholder="placeholder_hotkey_capture" readonly>
      </div>
      <div class="form-group">
        <label for="hotkeyScroll" data-i18n="label_hotkey_scroll"></label>
        <input type="text" id="hotkeyScroll" data-i18n-placeholder="placeholder_hotkey_scroll" readonly>
        <p class="hint" data-i18n="hint_hotkey"></p>
      </div>
    </div>

    <div class="card license-compact">
      <div class="stat">
        <div class="license-info">
          <span data-i18n="label_license"></span>: 
          <span class="stat-val" id="licenseStatus">-</span>
        </div>
        <a class="license-key-link" href="/license-key" data-i18n="btn_license_key"></a>
      </div>
    </div>

    <button class="save-btn" onclick="saveConfig()" data-i18n="btn_save"></button>
    <button class="reset-btn" onclick="resetConfig()" data-i18n="btn_reset"></button>
    <p id="status"></p>

    <footer id="common-footer"></footer>
  </div>

  <!-- 권한 안내 모달 -->
  <div class="modal-overlay hidden" id="permModal">
    <div class="modal-box">
      <h2 data-i18n="modal_title"></h2>
      <p class="modal-sub" data-i18n="modal_sub"></p>
      <ol class="modal-steps">
        <li>
          <span class="step-num">1</span>
          <span class="step-text" data-i18n="modal_step1"></span>
        </li>
        <li>
          <span class="step-num">2</span>
          <span class="step-text" data-i18n="modal_step2"></span>
        </li>
        <li>
          <span class="step-num">3</span>
          <span class="step-text" data-i18n="modal_step3"></span>
        </li>
      </ol>
      <button class="modal-close-btn" onclick="closePermModal()" data-i18n="modal_btn_close"></button>
    </div>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
