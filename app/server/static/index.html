<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaptureGo Settings</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>CaptureGo <span data-i18n="title_suffix"></span></h1>
      <div class="lang-btn-group">
        <button class="theme-btn" id="btnTheme" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
        <a class="lang-btn license-key-btn" href="/license-key" data-i18n="btn_license_key"></a>
        <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="btnKO" onclick="setLang('ko')">한국어</button>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section_permissions"></h2>
      <div id="permList"><span class="perm-loading" data-i18n="perm_loading"></span></div>
    </div>

    <div class="card">
      <h2 data-i18n="section_save_path"></h2>
      <div class="form-group">
        <label for="saveDir" data-i18n="label_save_dir"></label>
        <input type="text" id="saveDir" data-i18n-placeholder="placeholder_save_dir">
        <p class="hint" data-i18n="hint_save_dir"></p>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section_hotkeys"></h2>
      <div class="form-group">
        <label for="hotkeyCapture" data-i18n="label_hotkey_capture"></label>
        <input type="text" id="hotkeyCapture" data-i18n-placeholder="placeholder_hotkey_capture" readonly>
      </div>
      <div class="form-group">
        <label for="hotkeyScroll" data-i18n="label_hotkey_scroll"></label>
        <input type="text" id="hotkeyScroll" data-i18n-placeholder="placeholder_hotkey_scroll" readonly>
        <p class="hint" data-i18n="hint_hotkey"></p>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section_status"></h2>
      <div class="stat"><span data-i18n="label_capture_count"></span><span class="stat-val" id="captureCount">-</span></div>
      <div class="stat"><span data-i18n="label_license"></span><span class="stat-val" id="licenseStatus">-</span></div>
    </div>

    <button class="save-btn" onclick="saveConfig()" data-i18n="btn_save"></button>
    <button class="reset-btn" onclick="resetConfig()" data-i18n="btn_reset"></button>
    <p id="status"></p>

    <footer>
      <div>github.com/danielk0121 &mdash; <span id="buildtime">v-dev</span></div>
      <div><a href="/license">Open Source Licenses</a></div>
    </footer>
  </div>

  <!-- 권한 안내 모달 -->
  <div class="modal-overlay hidden" id="permModal">
    <div class="modal-box">
      <h2 data-i18n="modal_title"></h2>
      <p class="modal-sub" data-i18n="modal_sub"></p>
      <ol class="modal-steps">
        <li>
          <span class="step-num">1</span>
          <span class="step-text" data-i18n="modal_step1"></span>
        </li>
        <li>
          <span class="step-num">2</span>
          <span class="step-text" data-i18n="modal_step2"></span>
        </li>
        <li>
          <span class="step-num">3</span>
          <span class="step-text" data-i18n="modal_step3"></span>
        </li>
      </ol>
      <button class="modal-close-btn" onclick="closePermModal()" data-i18n="modal_btn_close"></button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
